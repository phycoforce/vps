# Managed by Ansible (roles/base). Network hardening on top of Ubuntu defaults.
# Note: ip_forward stays enabled via 99-tailscale.conf (exit-node requirement).

# Don't emit ICMP redirects (we forward for Tailscale, but peers must not
# learn routes from us) and never honour incoming ones.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# No source-routed packets.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# SYN-flood protection (Ubuntu default, pinned explicitly).
net.ipv4.tcp_syncookies = 1

# 2 GB swap file exists as an OOM safety net, not for regular paging.
vm.swappiness = 10
