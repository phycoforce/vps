# Managed by Ansible (roles/ssh).
# sshd_config.d is Included at the top of sshd_config, and for scalar options
# the FIRST occurrence wins — so everything here overrides the main file.
# The original cloud-init runcmd sed hardening silently failed (it anchored on
# uncommented lines); this drop-in is the real fix.

PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin no
PubkeyAuthentication yes
AllowUsers aaron

X11Forwarding no
MaxAuthTries 4
LoginGraceTime 30

# Drop dead/idle sessions after 3 x 300 s.
ClientAliveInterval 300
ClientAliveCountMax 3
