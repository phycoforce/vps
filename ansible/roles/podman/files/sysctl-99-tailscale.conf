# Managed by Ansible (roles/podman).
# ipv4 forwarding is required for podman's published-port DNAT path
# (sing-box on 3128). Note: tailscale itself runs userspace netstack
# (TS_USERSPACE=true) and does NOT use kernel forwarding; v6 forwarding is
# kept to match long-standing box state and for future kernel-mode use.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
