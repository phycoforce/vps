---
- name: Ensure authorized key for {{ vps_user }}
  ansible.posix.authorized_key:
    user: "{{ vps_user }}"
    key: "{{ ssh_authorized_key }}"
    state: present

- name: SSH hardening drop-in
  ansible.builtin.copy:
    src: 10-hardening.conf
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload sshd

- name: Remove root's authorized_keys (root login is disabled; aaron+sudo is the path)
  ansible.builtin.file:
    path: /root/.ssh/authorized_keys
    state: absent

- name: Apply sshd changes before touching the firewall
  ansible.builtin.meta: flush_handlers
